name: SPECTER

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  specter:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests

      - name: Run SPECTER
        run: python specter.py
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
