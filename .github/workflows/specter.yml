name: SPECTER - Obnovlenie kluchey

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  specter:
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      
      - name: Install xray
        run: |
          if [ ! -f ./xray ]; then
            curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/download/v1.8.6/Xray-linux-64.zip
            unzip xray.zip xray
            chmod +x xray
            rm xray.zip
          fi

      - name: Proverka kluchey
        run: python3 specter.py

      - name: Sohranenie
        run: |
          git config user.email "specter@local"
          git config user.name "SPECTER Bot"
          git add keys.txt
          git diff --staged --quiet || git commit -m "Auto update keys"
          git push
